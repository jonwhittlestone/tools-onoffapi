version: '3.8'

services:
  onoffapi:
    build: .
    ports:
      - "8082:8080"       # host:container — 8082 avoids clash with kaizen (3001)
    environment:
      - PORT=8080
      - API_KEY=${API_KEY} # set in .env or export before running docker-compose up
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  proxy:
    external: true          # same nginx proxy network as kaizen
