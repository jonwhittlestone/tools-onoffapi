version: '3.8'

services:
  onoffapi:
    build: .
    network_mode: host      # must be on host network so WoL UDP broadcasts reach the LAN
    environment:
      - PORT=8082
      - API_KEY=${API_KEY} # set in .env or export before running docker-compose up
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8082' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
