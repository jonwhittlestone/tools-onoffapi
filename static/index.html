<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>onoffapi</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="login">
        <h1>onoffapi</h1>
        <form id="login-form">
            <label for="password">API key</label>
            <input type="password" id="password" placeholder="Enter API key" autofocus>
            <button type="submit">Login</button>
        </form>
        <p id="login-error" class="error"></p>
    </div>

    <div id="app" style="display:none">
        <h1>Machines <button id="theme-toggle">🌓</button> <button id="logout">Logout</button></h1>
        <div id="machines"></div>
    </div>

    <script>
        let apiKey = localStorage.getItem('apiKey');

        // Theme — restore saved preference or follow OS default
        const root = document.documentElement;
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) root.setAttribute('data-theme', savedTheme);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('theme-toggle').addEventListener('click', () => {
                const current = root.getAttribute('data-theme');
                const isDark = current === 'dark' || (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
                const next = isDark ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        });

        // Apply reachability state to a machine card.
        // suspended=true shows the 💤 indicator rather than plain offline.
        function applyState(machineId, reachable, suspended) {
            const card = document.getElementById('status-' + machineId).closest('.machine');
            const wakeBtn = card.querySelector('[data-cmd="wake"]');
            const suspendBtn = card.querySelector('[data-cmd="suspend"]');
            const shutdownBtn = card.querySelector('[data-cmd="shutdown"]');
            if (wakeBtn) wakeBtn.disabled = reachable;
            if (suspendBtn) suspendBtn.disabled = !reachable;
            if (shutdownBtn) shutdownBtn.disabled = !reachable;
            const indicator = card.querySelector('.state-indicator');
            if (reachable) {
                indicator.textContent = '🟢 online';
                indicator.className = 'state-indicator';
            } else if (suspended) {
                indicator.textContent = '💤 suspended';
                indicator.className = 'state-indicator suspended';
            } else {
                indicator.textContent = '🔴 offline';
                indicator.className = 'state-indicator';
            }
        }

        // Poll GET /machines/{id}/ping every 10 seconds.
        // If the machine comes back online after a suspend, the indicator resets.
        function pollState(machineId) {
            async function check() {
                try {
                    const res = await fetch('./machines/' + machineId + '/ping', {
                        headers: { 'X-API-Key': apiKey },
                        signal: AbortSignal.timeout(3000)
                    });
                    if (!res.ok) return;
                    const { reachable } = await res.json();
                    applyState(machineId, reachable, false);
                } catch (_) {}
            }
            check();
            return setInterval(check, 10000);
        }

        async function loadMachines() {
            const res = await fetch('./machines', {
                headers: { 'X-API-Key': apiKey }
            });
            if (!res.ok) {
                if (res.status === 401) { logout(); return; }
                document.getElementById('machines').textContent = 'Error: ' + res.status;
                return;
            }
            const machines = await res.json();
            document.getElementById('machines').innerHTML = machines.map(m => `
                <div class="machine">
                    <h2>${m.name}</h2>
                    <p><strong>IP:</strong> ${m.ip}</p>
                    <p><strong>MAC:</strong> ${m.mac}</p>
                    ${m.notes ? `<p>${m.notes}</p>` : ''}
                    <div class="machine-actions">
                        ${m.hide_wake ? '' : `<button data-cmd="wake" onclick="action('${m.id}','wake',this)">☀️ WAKE</button>`}
                        ${m.hide_suspend ? '' : `<button data-cmd="suspend" onclick="action('${m.id}','suspend',this)">💤 SUSPEND</button>`}
                        <button data-cmd="shutdown" onclick="action('${m.id}','shutdown',this)">🌙 SHUTDOWN</button>
                        <span class="state-indicator"></span>
                        <span class="status" id="status-${m.id}"></span>
                    </div>
                </div>
            `).join('');
            machines.forEach(m => pollState(m.id));
        }

        function showApp() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = '';
            loadMachines();
        }

        function logout() {
            localStorage.removeItem('apiKey');
            apiKey = null;
            document.getElementById('app').style.display = 'none';
            document.getElementById('login').style.display = '';
            document.getElementById('password').value = '';
        }

        document.getElementById('login-form').addEventListener('submit', async e => {
            e.preventDefault();
            apiKey = document.getElementById('password').value.trim();
            const res = await fetch('./machines', { headers: { 'X-API-Key': apiKey } });
            if (!res.ok) {
                document.getElementById('login-error').textContent = 'Invalid API key';
                return;
            }
            localStorage.setItem('apiKey', apiKey);
            showApp();
        });

        async function action(id, cmd, btn) {
            btn.disabled = true;
            const statusEl = document.getElementById('status-' + id);
            statusEl.textContent = cmd + '…';
            try {
                const res = await fetch('./machines/' + id + '/' + cmd, {
                    method: 'POST',
                    headers: { 'X-API-Key': apiKey }
                });
                if (res.ok) {
                    statusEl.textContent = 'OK';
                    if (cmd === 'wake') {
                        applyState(id, true, false);
                    } else if (cmd === 'suspend') {
                        applyState(id, false, true);
                    } else {
                        applyState(id, false, false);
                    }
                } else {
                    statusEl.textContent = 'Error ' + res.status;
                    btn.disabled = false;
                }
            } catch (e) {
                statusEl.textContent = 'Network error';
                btn.disabled = false;
            }
        }

        document.getElementById('logout').addEventListener('click', logout);

        async function init() {
            const urlKey = new URLSearchParams(window.location.search).get('key');
            if (urlKey) {
                const res = await fetch('./auth?key=' + encodeURIComponent(urlKey));
                if (res.ok) {
                    apiKey = urlKey;
                    localStorage.setItem('apiKey', apiKey);
                    history.replaceState(null, '', window.location.pathname);
                    showApp();
                } else {
                    document.getElementById('login-error').textContent = 'Invalid key in link';
                }
            } else if (apiKey) {
                showApp();
            }
        }

        init();
    </script>
</body>
</html>
